apiVersion: v1
kind: Secret
metadata:
  name: rds-secret
  namespace: crypto-ai-analytics
type: Opaque
stringData:
  connection-string: "postgresql://postgres:REPLACE_WITH_SECRET@REPLACE_WITH_RDS_ENDPOINT:5432/crypto_ai"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: crypto-ai-analytics
type: Opaque
stringData:
  connection-string: "redis://REPLACE_WITH_REDIS_AUTH@REPLACE_WITH_REDIS_ENDPOINT:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: crypto-ai-analytics
type: Opaque
stringData:
  secret: "REPLACE_WITH_JWT_SECRET"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: crypto-ai-analytics
type: Opaque
stringData:
  coinbase-api-key: "REPLACE_WITH_COINBASE_API_KEY"
  binance-api-key: "REPLACE_WITH_BINANCE_API_KEY"
  twitter-api-key: "REPLACE_WITH_TWITTER_API_KEY"
  reddit-client-id: "REPLACE_WITH_REDDIT_CLIENT_ID"
  news-api-key: "REPLACE_WITH_NEWS_API_KEY"
  telegram-bot-token: "REPLACE_WITH_TELEGRAM_BOT_TOKEN"
  discord-bot-token: "REPLACE_WITH_DISCORD_BOT_TOKEN"