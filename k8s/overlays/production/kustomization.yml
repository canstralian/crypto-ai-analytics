apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crypto-ai-analytics-prod

resources:
- ../../base

namePrefix: prod-

patchesStrategicMerge:
- replica-patch.yml
- resource-patch.yml

configMapGenerator:
- name: backend-config
  behavior: merge
  literals:
  - ENVIRONMENT=production
  - LOG_LEVEL=info
  - CORS_ORIGINS=https://crypto-ai-analytics.com

images:
- name: ghcr.io/canstralian/crypto-ai-analytics/backend
  newTag: latest
- name: ghcr.io/canstralian/crypto-ai-analytics/frontend
  newTag: latest