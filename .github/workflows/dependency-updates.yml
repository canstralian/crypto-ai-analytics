name: Dependency Updates

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9 AM UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-python-dependencies:
    name: Update Python Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Update backend dependencies
        run: |
          if [ -f backend/requirements.in ]; then
            cd backend
            pip-compile --upgrade requirements.in
            pip-compile --upgrade requirements-dev.in
          fi

      - name: Create Pull Request for Python updates
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Python dependencies'
          title: 'chore: update Python dependencies'
          body: |
            Automated dependency update for Python packages.
            
            Please review the changes and ensure all tests pass before merging.
          branch: chore/update-python-deps
          delete-branch: true

  update-node-dependencies:
    name: Update Node Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Update frontend dependencies
        run: |
          if [ -d frontend ]; then
            cd frontend
            npx npm-check-updates -u
            npm install
          fi

      - name: Create Pull Request for Node updates
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Node.js dependencies'
          title: 'chore: update Node.js dependencies'
          body: |
            Automated dependency update for Node.js packages.
            
            Please review the changes and ensure all tests pass before merging.
          branch: chore/update-node-deps
          delete-branch: true